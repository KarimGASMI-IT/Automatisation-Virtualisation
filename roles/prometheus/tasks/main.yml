---
- name: Install Prometheus
  apt:
    name: prometheus
    state: present
    update_cache: yes

- name: Deploy Prometheus configuration
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: root
    group: root
    mode: '0644'
  notify: Restart Prometheus

- name: Ensure Prometheus is enabled and started
  service:
    name: prometheus
    state: started
    enabled: true
