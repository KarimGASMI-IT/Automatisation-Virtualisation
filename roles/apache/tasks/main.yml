---
- name: Install Apache
  apt:
    name: apache2
    state: present
    update_cache: yes

- name: Ensure Apache is enabled and started
  service:
    name: apache2
    state: started
    enabled: true

- name: Deploy custom index page
  template:
    src: index.html.j2
    dest: "{{ web_document_root }}/index.html"
    owner: root
    group: root
    mode: '0644'
  notify: Restart Apache
